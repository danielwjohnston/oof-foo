name: CI/CD

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    name: Test PowerShell Module

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run PSScriptAnalyzer
      shell: pwsh
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
        $results = Invoke-ScriptAnalyzer -Path .\src\OofFoo -Recurse -ReportSummary
        if ($results) {
          $results | Format-Table -AutoSize
          Write-Host "Found $($results.Count) issue(s)" -ForegroundColor Yellow
        } else {
          Write-Host "No issues found!" -ForegroundColor Green
        }

    - name: Test module manifest
      shell: pwsh
      run: |
        $manifest = Test-ModuleManifest -Path .\src\OofFoo\OofFoo.psd1 -ErrorAction Stop
        Write-Host "Module: $($manifest.Name) v$($manifest.Version)" -ForegroundColor Green

    - name: Install Pester
      shell: pwsh
      run: |
        Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.0

    - name: Run Pester tests
      shell: pwsh
      run: |
        Import-Module Pester
        $config = New-PesterConfiguration
        $config.Run.Path = '.\tests'
        $config.Run.Exit = $true
        $config.TestResult.Enabled = $true
        $config.TestResult.OutputPath = 'test-results.xml'
        Invoke-Pester -Configuration $config

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: test-results.xml

  analyze-security:
    runs-on: windows-latest
    name: Security Analysis

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run security scan
      shell: pwsh
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
        $securityResults = Invoke-ScriptAnalyzer -Path .\src\OofFoo -Recurse -Severity Error,Warning
        if ($securityResults) {
          Write-Host "Security issues found:" -ForegroundColor Red
          $securityResults | Format-Table -AutoSize
          exit 1
        } else {
          Write-Host "No security issues found!" -ForegroundColor Green
        }

  build:
    runs-on: windows-latest
    name: Build Package
    needs: [test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build package
      shell: pwsh
      run: |
        .\build\Build.ps1 -Clean -Test -Package

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: oof-foo-package
        path: build/output/*.zip
